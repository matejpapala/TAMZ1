<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ionic Karty</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
  <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
  <script nomodule src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.js"></script>
</head>
<body>
  <ion-app>
    <ion-content class="ion-padding">
      
      <ion-card>
        <ion-card-header>
          <ion-card-title>První karta</ion-card-title>
        </ion-card-header>
        <ion-card-content>
          <ion-input id = "login" label="Login" label-placement="floating" fill="solid" class="ion-margin-bottom"></ion-input>
          <ion-input label="base64-token" label-placement="floating" fill="solid" class="ion-margin-bottom" readonly = "true"></ion-input>
          <ion-button expand="block">Odeslat data</ion-button>
        </ion-card-content>
      </ion-card>

      <ion-card>
        <ion-card-header>
          <ion-card-title>Druhá karta</ion-card-title>
        </ion-card-header>
        <ion-card-content>
          <ion-input label="decoded secret" label-placement="floating" fill="solid" class="ion-margin-bottom"></ion-input>
          <ion-button expand="block" color="secondary">Potvrdit</ion-button>
        </ion-card-content>
      </ion-card>

    </ion-content>
  </ion-app>
</body>
</html>
